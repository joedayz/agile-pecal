<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Cypress — clase</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 28rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      button {
        cursor: pointer;
        margin-right: 0.5rem;
      }
      #mensaje {
        margin-top: 1rem;
        padding: 0.75rem;
        background: #ecfdf5;
        border-radius: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1 data-cy="titulo">Práctica Cypress</h1>
    <p>
      Clics: <strong data-cy="contador">0</strong>
    </p>
    <button type="button" data-cy="btn-sumar">Sumar 1</button>

    <hr style="margin: 1.5rem 0" />

    <p>
      <label>
        Tu nombre
        <input type="text" data-cy="nombre" placeholder="Ej. Ana" autocomplete="off" />
      </label>
    </p>
    <button type="button" data-cy="btn-saludar">Saludar</button>
    <p id="mensaje" data-cy="mensaje" hidden></p>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
